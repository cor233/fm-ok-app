name: Delete All Releases

on:
  workflow_dispatch:        # 手动触发
  # schedule:               # 可选定时触发，例如每天凌晨2点
  #   - cron: '0 2 * * *'

jobs:
  delete-releases:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup GitHub CLI
        run: gh --version   # 确保 gh 已安装（默认环境已包含）

      - name: Delete all releases
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}   # 使用内置的 GITHUB_TOKEN，需要设置权限
        run: |
          # 获取所有 Release 的 ID 和 tag 名称
          releases=$(gh api repos/:owner/:repo/releases --paginate --jq '.[] | {id: .id, tag: .tag_name}')
          
          if [ -z "$releases" ]; then
            echo "No releases found."
            exit 0
          fi

          echo "$releases" | jq -c '.' | while read release; do
            id=$(echo "$release" | jq -r '.id')
            tag=$(echo "$release" | jq -r '.tag')
            echo "Deleting release: $tag (ID: $id)"
            gh api -X DELETE repos/:owner/:repo/releases/$id --silent && echo "Deleted $tag"
          done
