name: Delete All Releases and Tags (Robust)

on:
  workflow_dispatch:

jobs:
  delete:
    runs-on: ubuntu-latest
    timeout-minutes: 60   # 根据数量调整
    steps:
      - name: Delete all Releases via API
        env:
          GH_TOKEN: ${{ secrets.PAT }}
        run: |
          echo "Fetching and deleting all releases..."
          # 使用 --paginate 自动处理分页
          gh api repos/${{ github.repository }}/releases --paginate \
            --jq '.[].id' | while read id; do
            echo "Deleting release $id"
            gh release delete "$id" --yes || echo "Failed to delete $id"
            sleep 0.2
          done

      - name: Delete all Tags via API
        env:
          GH_TOKEN: ${{ secrets.PAT }}
        run: |
          echo "Fetching and deleting all tags..."
          # 获取所有 tag refs
          gh api repos/${{ github.repository }}/git/refs/tags --paginate \
            --jq '.[].ref' | while read ref; do
            echo "Deleting ref $ref"
            gh api -X DELETE "repos/${{ github.repository }}/git/$ref" || echo "Failed to delete $ref"
            sleep 0.2
          done
