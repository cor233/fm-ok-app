name: Delete All Releases and Tags

on:
  workflow_dispatch:

jobs:
  delete:
    runs-on: ubuntu-latest
    steps:
      - name: Delete all Releases via API
        env:
          GH_TOKEN: ${{ secrets.PAT }}
        run: |
          echo "Fetching all releases..."
          releases=$(gh release list --limit 1000 --json id --jq '.[].id')
          if [ -z "$releases" ]; then
            echo "No releases found."
          else
            for id in $releases; do
              echo "Deleting release ID: $id"
              gh release delete "$id" --yes
            done
          fi

      - name: Delete all Tags via API
        env:
          GH_TOKEN: ${{ secrets.PAT }}
        run: |
          echo "Fetching all tags via API..."
          # 获取所有 tag refs
          tags=$(curl -s -H "Authorization: token $GH_TOKEN" \
            "https://api.github.com/repos/${{ github.repository }}/git/refs/tags" | jq -r '.[].ref')
          if [ -z "$tags" ]; then
            echo "No tags found."
          else
            for ref in $tags; do
              echo "Deleting $ref"
              curl -X DELETE -H "Authorization: token $GH_TOKEN" \
                "https://api.github.com/repos/${{ github.repository }}/git/$ref"
              # 可选：添加短暂延迟避免触发速率限制
              sleep 0.5
            done
          fi
