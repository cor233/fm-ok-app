name: 同步Releases
on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'

env:
  TARGET_BRANCH: okjack

jobs:
  sync-all-releases:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: 获取源仓库所有 Releases（按发布时间排序）
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SOURCE_REPO="lystv/fmapp"
          PAGE=1
          PER_PAGE=100
          RELEASES_JSON=""
          while true; do
            API_URL="https://api.github.com/repos/${SOURCE_REPO}/releases?per_page=${PER_PAGE}&page=${PAGE}"
            RESPONSE=$(curl -s -H "Accept: application/vnd.github.v3+json" \
              -H "Authorization: token $GH_TOKEN" "$API_URL")
            if ! echo "$RESPONSE" | jq -e 'type == "array"' > /dev/null 2>&1; then
              echo "错误：API 响应不是数组"
              exit 1
            fi
            [ "$(echo "$RESPONSE" | jq length)" -eq 0 ] && break
            RELEASES_JSON=$(echo "$RELEASES_JSON" "$RESPONSE" | jq -s 'add')
            PAGE=$((PAGE + 1))
            sleep 0.5
          done
          echo "$RELEASES_JSON" | jq 'sort_by(.published_at)' > releases.json

      - name: 同步每个 Release 到 okjack 分支
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SOURCE_REPO="lystv/fmapp"
          TARGET_REPO="${{ github.repository }}"
          TARGET_BRANCH="${{ env.TARGET_BRANCH }}"

          BRANCH_INFO=$(curl -s -H "Authorization: token $GH_TOKEN" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/$TARGET_REPO/branches/$TARGET_BRANCH")
          TARGET_SHA=$(echo "$BRANCH_INFO" | jq -r '.commit.sha')
          if [ "$TARGET_SHA" = "null" ]; then
            echo "错误：分支 $TARGET_BRANCH 不存在"
            exit 1
          fi

          jq -c '.[]' releases.json | while read release; do
            TAG_NAME=$(echo "$release" | jq -r '.tag_name')
            TITLE=$(echo "$release" | jq -r '.name // .tag_name')
            BODY=$(echo "$release" | jq -r '.body // ""')
            IS_PRERELEASE=$(echo "$release" | jq -r '.prerelease')
            IS_DRAFT=$(echo "$release" | jq -r '.draft')

            HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              -H "Authorization: token $GH_TOKEN" \
              "https://api.github.com/repos/$TARGET_REPO/releases/tags/$TAG_NAME")

            if [ "$HTTP_STATUS" -eq 200 ]; then
              echo "Release $TAG_NAME 已存在，跳过"
              continue
            fi

            CREATE_CMD="gh release create \"$TAG_NAME\" --repo \"$TARGET_REPO\" --title \"$TITLE\" --target \"$TARGET_SHA\""
            [ -n "$BODY" ] && echo "$BODY" > body.txt && CREATE_CMD="$CREATE_CMD --notes-file body.txt"
            [ "$IS_PRERELEASE" = "true" ] && CREATE_CMD="$CREATE_CMD --prerelease"
            [ "$IS_DRAFT" = "true" ] && CREATE_CMD="$CREATE_CMD --draft"

            if ! eval "$CREATE_CMD"; then
              echo "创建 Release $TAG_NAME 失败"
              exit 1
            fi

            ASSET_URLS=$(echo "$release" | jq -r '.assets[]?.browser_download_url')
            if [ -n "$ASSET_URLS" ]; then
              TEMP_DIR=$(mktemp -d)
              cd "$TEMP_DIR"
              echo "$ASSET_URLS" | while read url; do
                [ -z "$url" ] && continue
                echo "下载 $url"
                curl -f -s -L -O "$url" || echo "下载失败: $url"
              done
              for file in *; do
                [ -f "$file" ] && gh release upload "$TAG_NAME" "$file" --repo "$TARGET_REPO" --clobber
              done
              cd .. && rm -rf "$TEMP_DIR"
            fi
            rm -f body.txt
          done
